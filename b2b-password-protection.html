    <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0c0c0e;
      --surface: #141416;
      --border: #2a2a30;
      --accent: #b85c38;
      --accent-dim: rgba(184, 92, 56, 0.15);
      --accent-light: #f5ede4;
      --text: #f0ede8;
      --muted: #6b6760;
      --error: #e07070;
      --success: #70c99e;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Archivio', 'EB Garamond', Georgia, serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    /* Background grain */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }
    /* Soft glow */
    body::after {
      content: '';
      position: fixed;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(184,92,56,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    .card {
      position: relative;
      z-index: 1;
      width: min(420px, 92vw);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      padding: 48px 40px 40px;
      animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .lock-icon {
      width: 40px;
      height: 40px;
      margin-bottom: 28px;
      opacity: 0.6;
    }
    h1 {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 30px;
      font-weight: 400;
      letter-spacing: -0.01em;
      line-height: 1.2;
      margin-bottom: 8px;
      color: var(--text);
    }
    h1 em {
      font-style: italic;
      color: var(--accent);
    }
    .subtitle {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: lowercase;
      font-variant: small-caps;
      margin-bottom: 20px;
    }
    .field {
      margin-top: 24px;
      margin-bottom: 2px;
    }
    label {
      display: block;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 11px;
      letter-spacing: 0.08em;
      font-variant: small-caps;
      color: var(--muted);
      margin-bottom: 8px;
    }
    input[type="password"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      color: var(--text);
      font-family: 'Archivio', 'EB Garamond', Georgia, serif;
      font-size: 15px;
      padding: 12px 16px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      letter-spacing: 0.05em;
    }
    input[type="password"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }
    input[type="password"].error-state {
      border-color: var(--error);
      box-shadow: 0 0 0 3px rgba(224, 112, 112, 0.12);
      animation: shake 0.35s ease;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-6px); }
      40%       { transform: translateX(6px); }
      60%       { transform: translateX(-4px); }
      80%       { transform: translateX(4px); }
    }
    .message {
      font-size: 11px;
      letter-spacing: 0.04em;
      margin-top: 8px;
      min-height: 16px;
      transition: opacity 0.2s;
    }
    .message.error { color: var(--error); }
    .message.success { color: var(--success); }
    button {
      width: 100%;
      margin-top: 6px;
      background: var(--accent);
      color: var(--accent-light);
      border: none;
      border-radius: 0.75rem;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.02em;
      padding: 14px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }
    button:hover { opacity: 0.85; }
    button:active { transform: scale(0.99); }
    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .divider {
      height: 1px;
      background: var(--border);
      margin: 32px 0 20px;
    }
    .footer-note {
      font-size: 14px;
      color: var(--muted);
      letter-spacing: 0.02em;
      text-align: center;
      line-height: 1.6;
    }
    .footer-note a {
      color: var(--accent);
      text-decoration: underline;
      text-underline-offset: 3px;
      transition: opacity 0.2s;
    }
    .footer-note a:hover { opacity: 0.7; }
    /* Redirect overlay */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 100;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      animation: fadeIn 0.4s ease both;
    }
    .overlay.active { display: flex; }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .redirect-text {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: lowercase;
      font-variant: small-caps;
    }
  </style>

<body>
  <div class="card">
    <svg class="lock-icon" viewbox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" color="#e8d5b0">
      <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
      <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
    </svg>
    <h1>This page is <em>private</em></h1>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" autofocus="">
      <div class="message" id="message"></div>
    </div>
    <button id="submitBtn" onclick="checkPassword()">Unlock</button>
    <div class="divider"></div>
    <p class="footer-note">
      <a href="mailto:francesca@floi.it?subject=Password%20Request&body=Hi%20Francesca%2C%0A%0AI%27d%20like%20to%20request%20access%20to%20the%20protected%20page.%0A%0AThank%20you!">Contact the site owner</a> if you need access.<br>Password on cv.
    </p>
  </div>
  <div class="overlay" id="overlay">
    <div class="spinner"></div>
    <span class="redirect-text">Redirecting&hellip;</span>
  </div>
  <script>
    // ─────────────────────────────────────────────
    // CONFIGURATION — edit these two values
    // ─────────────────────────────────────────────
    const CORRECT_PASSWORD = "B2BPartnerPortal";   // ← your password
    const REDIRECT_URL     = "https://www.figma.com/design/wZ3EzWippN537vmASMjWSO/B2B-Partner-portal?node-id=0-1&t=XCggF1NkEz4qiWl4-1"; // ← destination URL
    // ─────────────────────────────────────────────
    const input   = document.getElementById('password');
    const message = document.getElementById('message');
    const btn     = document.getElementById('submitBtn');
    const overlay = document.getElementById('overlay');
    // Allow Enter key
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') checkPassword();
    });
    function checkPassword() {
      const val = input.value.trim();
      if (!val) {
        showError("Please enter a password.");
        return;
      }
      btn.disabled = true;
      if (val === CORRECT_PASSWORD) {
        message.textContent = "Access granted.";
        message.className = "message success";
        setTimeout(() => {
          overlay.classList.add('active');
          setTimeout(() => { window.location.href = REDIRECT_URL; }, 800);
        }, 400);
      } else {
        showError("Incorrect password. Try again.");
        input.classList.add('error-state');
        input.addEventListener('animationend', () => {
          input.classList.remove('error-state');
        }, { once: true });
        input.value = '';
        input.focus();
        btn.disabled = false;
      }
    }
    function showError(msg) {
      message.textContent = msg;
      message.className = "message error";
    }
  </script>
</body>
